name: Manual Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version Tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    name: Build & Release Windows EXE
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
        pip install PyQt6 PyQt6-Fluent-Widgets PyQt6-Frameless-Window pywin32 darkdetect

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name="FitgirlHelperRedesigned" ff_grabber.py

    - name: Create GitHub Release and Upload EXE
      uses: ncipollo/release-action@v1
      with:
        artifacts: "dist/FitgirlHelperRedesigned.exe"
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ github.event.inputs.version }}
        name: Release ${{ github.event.inputs.version }}
        body: "Automated manual release build for ${{ github.event.inputs.version }}."
        allowUpdates: true
